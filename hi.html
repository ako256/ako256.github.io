<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .emoji-bg-item {
            position: fixed;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            z-index: 0;
            animation: emojiLife 7s linear forwards;
        }

        @keyframes emojiLife {
            /* Fade in (3s) */
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            42.86% {
                opacity: 0.8;
                transform: scale(1);
            }

            /* Stay visible (1s) */
            57.14% {
                opacity: 0.8;
                transform: scale(1);
            }

            /* Fade out (3s) */
            100% {
                opacity: 0;
                transform: scale(1.15);
            }
        }
    </style>
</head>
<body>
    <div class="center-container">
        <div class="name">HELLO KASAKKKKKKK</div>
    </div>

    <script>
        const emojiString = "❤️🧡💛💚💜🍟🦕🦕👀🫦";
        const emojis = [...emojiString];

        const MAX_EMOJIS = 10;
        const LIFETIME = 7000;

        const COLS = 5;
        const ROWS = 2;

        const occupiedRegions = new Set();

        function getRandomFreeRegion() {
            const free = [];

            for (let i = 0; i < COLS * ROWS; i++) {
                if (!occupiedRegions.has(i)) {
                    free.push(i);
                }
            }

            if (!free.length) return null;

            return free[Math.floor(Math.random() * free.length)];
        }

        function spawnEmoji() {
            if (document.querySelectorAll(".emoji-bg-item").length >= MAX_EMOJIS) {
                scheduleNextSpawn();
                return;
            }

            const region = getRandomFreeRegion();

            if (region === null) {
                scheduleNextSpawn();
                return;
            }

            occupiedRegions.add(region);

            const col = region % COLS;
            const row = Math.floor(region / COLS);

            const cellWidth = window.innerWidth / COLS;
            const cellHeight = window.innerHeight / ROWS;

            const x =
                col * cellWidth +
                cellWidth * 0.15 +
                Math.random() * (cellWidth * 0.7);

            const y =
                row * cellHeight +
                cellHeight * 0.15 +
                Math.random() * (cellHeight * 0.7);

            const emoji = document.createElement("div");
            emoji.className = "emoji-bg-item";

            emoji.textContent =
                emojis[Math.floor(Math.random() * emojis.length)];

            emoji.style.left = `${x}px`;
            emoji.style.top = `${y}px`;

            emoji.style.fontSize =
                `${24 + Math.random() * 48}px`;

            document.body.appendChild(emoji);

            setTimeout(() => {
                occupiedRegions.delete(region);
                emoji.remove();
            }, LIFETIME);

            scheduleNextSpawn();
        }

        function scheduleNextSpawn() {
            const delay = 300 + Math.random() * 2500;
            setTimeout(spawnEmoji, delay);
        }

        for (let i = 0; i < MAX_EMOJIS; i++) {
            setTimeout(
                spawnEmoji,
                Math.random() * 6000
            );
        }
    </script>
</body>
</html>
